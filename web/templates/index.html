<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyx 宇宙学模拟可视化分析平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<!-- ===== 顶部标题栏 ===== -->
<header class="main-header">
    <h1>🌌 Nyx 宇宙学模拟可视化分析平台</h1>
    <p>基于 AMReX 框架的并行自适应网格细化宇宙学模拟 — 实时交互式体渲染与统计演化分析</p>
</header>

<!-- ===== 主体仪表板 ===== -->
<div class="dashboard-grid">

    <!-- 左侧面板：二维投影 -->
    <aside class="panel left-panel">
        <div class="panel-header">二维投影参考</div>
        <div class="panel-content">
            <div class="proj-label">XY 投影 (Z轴)</div>
            <div class="mini-plot" id="vol-proj-x"><canvas></canvas><div class="tooltip"></div></div>
            <div class="proj-label">YZ 投影 (X轴)</div>
            <div class="mini-plot" id="vol-proj-y"><canvas></canvas><div class="tooltip"></div></div>
            <div class="proj-label">XZ 投影 (Y轴)</div>
            <div class="mini-plot" id="vol-proj-z"><canvas></canvas><div class="tooltip"></div></div>
        </div>
    </aside>

    <!-- 中间面板：三维体渲染 -->
    <main class="panel center-panel">
        <div class="panel-header">
            <span>三维体渲染 (Ray Marching)</span>
            <span class="panel-badge" id="vol-badge">t=0</span>
        </div>
        <div class="panel-content" style="flex-direction:column; gap:10px;">
            <div class="canvas-container" id="vol-three-container" style="flex:1;">
                <div class="canvas-overlay" id="vol-three-overlay">加载三维体数据中...</div>
                <canvas id="vol-tf-canvas" width="160" height="50"></canvas>
            </div>
        </div>
    </main>

    <!-- 右侧面板：统计分布 -->
    <aside class="panel right-panel">
        <div class="panel-header">密度统计分布</div>
        <div class="panel-content">
            <div class="filter-status" id="filter-status" style="display:none;">
                <div>筛选区间: <b id="filter-raw-range">-</b></div>
                <div>体素占比: <b id="filter-voxel-ratio">-</b></div>
            </div>
            <div class="stat-summary" id="stat-summary"></div>
            <div class="stat-plot" id="stat-hist-plot"></div>
            <div class="stat-plot" id="stat-loghist-plot"></div>
            <div class="stat-plot" id="stat-cdf-plot"></div>
        </div>
    </aside>

</div>

<!-- ===== 底部控制面板 ===== -->
<div class="control-bar">
    <!-- 第一行：导航与视图 -->
    <div class="control-row row-nav">
        <div class="control-group">
            <label>时间步</label>
            <input type="range" id="ctrl-timestep" min="0" max="99" value="0" oninput="onTimestepDrag()">
            <span class="ctrl-val" id="ctrl-ts-label">0</span>
        </div>
        <div class="control-group btn-group">
            <button id="play-btn" onclick="toggleAnimation()">▶ 播放</button>
            <button onclick="resetView()">重置视角</button>
        </div>
        <div class="control-group">
            <label>投影类型</label>
            <select id="ctrl-proj" onchange="onProjectionTypeChange()">
                <option value="mip" selected>MIP</option>
                <option value="aip">AIP</option>
            </select>
        </div>
        <div class="control-group btn-group">
            <button onclick="volPresetView('front')">正视图</button>
            <button onclick="volPresetView('side')">侧视图</button>
            <button onclick="volPresetView('top')">俯视图</button>
            <button onclick="volPresetView('iso')">等轴测</button>
        </div>
    </div>
    <!-- 第二行：渲染参数 + 密度筛选 -->
    <div class="control-row row-params">
        <div class="control-group">
            <label>传递函数</label>
            <select id="ctrl-tf" onchange="updateVolume3DUniforms()">
                <option value="0" selected>Hot (热力学)</option>
                <option value="1">Cool (冰蓝)</option>
                <option value="2">Fire (火焰)</option>
                <option value="3">Rainbow (彩虹)</option>
                <option value="4">yt Log-Layers (科学级)</option>
            </select>
        </div>
        <div class="control-group">
            <label>
                <input type="checkbox" id="ctrl-log" onchange="updateVolume3DUniforms()" style="vertical-align:middle; margin-right:4px;">
                对数映射
            </label>
        </div>
        <div class="control-group">
            <label>不透明度 <span id="ctrl-opacity-val">1.2</span></label>
            <input type="range" id="ctrl-opacity" min="0.1" max="3.0" value="1.2" step="0.1" oninput="updateVolume3DUniforms()">
        </div>
        <div class="control-group">
            <label>亮度 <span id="ctrl-brightness-val">1.3</span></label>
            <input type="range" id="ctrl-brightness" min="0.5" max="3.0" value="1.3" step="0.1" oninput="updateVolume3DUniforms()">
        </div>
        <div class="control-group">
            <label>采样质量</label>
            <select id="ctrl-quality" onchange="updateVolume3DUniforms()">
                <option value="0">低 (快速)</option>
                <option value="1" selected>中</option>
                <option value="2">高 (精细)</option>
            </select>
        </div>
        <div class="control-group">
            <label>密度筛选预设</label>
            <div class="btn-group">
                <button onclick="setFilterPreset('all')">全部</button>
                <button onclick="setFilterPreset('top10')">Top 10%</button>
                <button onclick="setFilterPreset('top5')">Top 5%</button>
                <button onclick="setFilterPreset('top1')">Top 1%</button>
            </div>
        </div>
        <div class="control-group filter-input-group">
            <label>自定义密度区间</label>
            <div class="filter-inputs">
                <input type="number" id="filter-min" placeholder="min" step="0.1" title="输入最小密度值">
                <span>~</span>
                <input type="number" id="filter-max" placeholder="max" step="0.1" title="输入最大密度值">
                <button onclick="applyCustomFilter()">应用</button>
            </div>
        </div>
    </div>
</div>

<div class="loading-screen" id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">正在预加载体数据...</div>
    <div class="loading-progress"><div class="loading-bar" id="loading-bar"></div></div>
    <div class="loading-detail" id="loading-detail">0 / 100</div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
